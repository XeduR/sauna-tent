<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<script>
		// Compute base path from current location and inject <base> before
		// the parser reaches any resource references (<link>, <script src>).
		// No static <base> in the HTML so the preload scanner resolves
		// resources against the document URL, which is already correct.
		// On GitHub Pages, 404.html redirects to the deployment root before
		// index.html loads, so location.pathname is always the root here.
		(function() {
			var basePath = decodeURIComponent(location.pathname);
			if (basePath.charAt(basePath.length - 1) !== '/') basePath += '/';

			var base = document.createElement('base');
			base.setAttribute('href', basePath);
			document.head.appendChild(base);

			var redirect = sessionStorage.getItem('spa-redirect');
			if (redirect) {
				sessionStorage.removeItem('spa-redirect');
				history.replaceState(null, '', redirect);
			}
		})();
	</script>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
